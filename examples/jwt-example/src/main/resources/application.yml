spring:
  application:
    name: jwt-example

  # === Security Starter Configuration ===
  security:
    starter:
      # JWT settings
      jwt:
        secret: "dGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudCBvbmx5IGRvIG5vdCB1c2UgaW4gcHJvZHVjdGlvbg=="
        expiration: 3600000          # 1 hour
        refresh-expiration: 86400000 # 24 hours
        issuer: "jwt-example"

      # Public paths (no authentication required)
      public-paths:
        - /api/auth/login
        - /api/auth/refresh
        - /h2-console/**

      # CORS (disabled by default)
      cors-enabled: false

      # Audit logging
      audit-enabled: true

  # H2 Console (development only)
  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:testdb

logging:
  level:
    io.github.springsecuritystarter: DEBUG
    SECURITY_AUDIT: INFO
